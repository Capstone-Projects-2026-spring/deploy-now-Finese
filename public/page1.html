<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinning Picture</title>
    <style>
      :root {
        color-scheme: light;
        --bg-top: #fef6e4;
        --bg-bottom: #dff3ff;
        --card: rgba(255, 255, 255, 0.78);
        --shadow: rgba(32, 56, 85, 0.18);
        --text: #1d3557;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
      }

      .card {
        width: min(90vw, 520px);
        padding: 2rem;
        border-radius: 28px;
        text-align: center;
        background: var(--card);
        box-shadow: 0 24px 60px var(--shadow);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 1.5rem;
        font-size: 1.05rem;
      }

      .spin-frame {
        width: min(68vw, 280px);
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 50%;
        padding: 14px;
        background: radial-gradient(circle at 30% 30%, #ffffff, #ffd6a5);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14);
      }

      .spin-frame img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        border-radius: 50%;
        animation: spin 6s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Spinning Picture</h1>
      <p>A picture in constant motion.</p>
      <div class="spin-frame">
        <img
          src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
          alt="Mountain landscape"
        />
      </div>
    </main>
  </body>
</html>
